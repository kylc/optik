name: python

on: [push, pull_request, workflow_dispatch]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_wheels:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: x86_64-apple-darwin
            args: --zig
          - target: aarch64-apple-darwin
            args: --zig

    steps:
      - name: checkout
        uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v4
        with:
          python-version: 3.9
          architecture: x64
      - name: build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ matrix.args }} --release --out dist
          manylinux: auto
          sccache: true
      - name: install built wheel
        if: ${{ matrix.target }} == 'x86_64-unknown-linux-gnu'
        run: |
          pip install optik-py --no-index --find-links dist
          python -c "import optik"
      - name: upload wheels
        uses: actions/upload-artifact@v3
        with:
          name: wheels
          path: dist
      - if: github.ref == 'refs/heads/master'
        name: update prerelease tag
        uses: EndBug/latest-tag@v1.6.1
        with:
          ref: "prerelease"

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/optik-py/Cargo.toml
      - name: upload sdist
        uses: actions/upload-artifact@v3
        with:
          name: wheels
          path: dist

  prerelease:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    concurrency:
      group: push-${{ github.ref_name }}-prerelease
      cancel-in-progress: true
    needs: [build_wheels, sdist]
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: wheels
          path: wheels

      - name: GitHub release
        uses: ncipollo/release-action@v1.12.0
        with:
          prerelease: true
          tag: "prerelease"
          name: "Development Build"
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          artifacts: "wheels/*"

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [build_wheels, sdist]
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: wheels
      - uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing *
